name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build web app
        run: npm run build -w @trustrespond/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ci-build-placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-placeholder-anon-key-not-for-production-use
